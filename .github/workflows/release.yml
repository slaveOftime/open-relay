name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: build-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: oly
            asset_name: oly-linux-amd64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: oly
            asset_name: oly-macos-arm64.zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: oly.exe
            asset_name: oly-windows-amd64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $version = $env:VERSION -replace '^v', ''
          $cargoToml = 'Cargo.toml'
          $content = Get-Content $cargoToml -Raw
          $updated = [regex]::Replace($content, '(?m)^version = "[^"]+"', "version = `"$version`"", 1)

          if ($updated -eq $content) {
            throw "Failed to update Cargo.toml version from tag $version"
          }

          Set-Content $cargoToml $updated -NoNewline

      # - name: Test
      #   run: cargo test --target ${{ matrix.target }}
        
      - name: Build release binary
        env:
          NPM_CONFIG_INCLUDE: optional
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (zip)
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" -DestinationPath "target/${{ matrix.target }}/release/${{ matrix.asset_name }}" -Force
        shell: pwsh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      - name: Upload binary to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.asset_name }}
          generate_release_notes: true

  update-homebrew-formula:
    name: update-homebrew-formula
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Update Formula/oly.rb
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          MACOS_SHA="$(sha256sum dist/oly-macos-arm64.zip/oly-macos-arm64.zip | awk '{print $1}')"
          LINUX_SHA="$(sha256sum dist/oly-linux-amd64.zip/oly-linux-amd64.zip | awk '{print $1}')"
          export VERSION MACOS_SHA LINUX_SHA

          ruby <<'RUBY'
          formula_path = "Formula/oly.rb"
          formula = File.read(formula_path)
          version = ENV.fetch("VERSION")
          macos_sha = ENV.fetch("MACOS_SHA")
          linux_sha = ENV.fetch("LINUX_SHA")

          formula.sub!(/^  version "[^"]+"/, %(  version "#{version}"))
          formula.sub!(/(on_macos do.*?sha256 ")([^"]+)(")/m, "\\1#{macos_sha}\\3")
          formula.sub!(/(on_linux do.*?sha256 ")([^"]+)(")/m, "\\1#{linux_sha}\\3")

          File.write(formula_path, formula)
          RUBY

      - name: Commit updated formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          if git diff --quiet -- Formula/oly.rb; then
            echo "Formula already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/oly.rb
          git commit -m "chore(formula): update Homebrew release metadata for ${VERSION}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

