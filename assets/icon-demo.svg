<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Deep dark cyber background gradient -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="50%" stop-color="#090e1a" />
            <stop offset="100%" stop-color="#020617" />
        </linearGradient>

        <!-- Dynamic Relay Data Flow Gradient -->
        <linearGradient id="relay-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#22d3ee" />
            <stop offset="50%" stop-color="#a855f7" />
            <stop offset="100%" stop-color="#ec4899" />
        </linearGradient>

        <!-- Soft Glow Filter for Neon Effect -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <!-- Terminal / CLI Grid Pattern -->
        <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.5" fill="#334155" opacity="0.3" />
        </pattern>

        <!-- Base Paths for the text 'oly' -->
        <g id="relay-paths" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <!-- 'o' as a data node -->
            <circle cx="184" cy="256" r="40" />
            <!-- 'l' as an active relay pipeline -->
            <path d="M 264 176 L 264 296" />
            <!-- 'y' as a branching circuit / fork -->
            <path d="M 304 216 L 354 286" />
            <path d="M 384 216 L 324 356" />
        </g>
    </defs>

    <!-- App Icon Base Shape -->
    <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />

    <!-- Developer CLI Grid -->
    <rect width="512" height="512" rx="112" fill="url(#grid)" />

    <!-- Ambient Backlight for the relay line -->
    <path d="M 64 256 L 448 256" stroke="#a855f7" stroke-width="120" filter="url(#glow)" opacity="0.1" stroke-linecap="round" />

    <!-- ==================== GLOW LAYER (Shadows/Bloom) ==================== -->
    <!-- CLI Prompt (>) Glow -->
    <path d="M 64 216 L 104 256 L 64 296" fill="none" stroke="#10b981" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" opacity="0.6" />
    
    <!-- Relay Paths (oly) Glow -->
    <use href="#relay-paths" stroke="url(#relay-grad)" stroke-width="20" filter="url(#glow)" opacity="0.6" />
    
    <!-- CLI Cursor (_) Glow -->
    <rect x="424" y="216" width="24" height="80" rx="4" fill="#10b981" filter="url(#glow)" opacity="0.6" />


    <!-- ==================== FRONT LAYER (Sharp Vector Art) ==================== -->
    <!-- CLI Prompt (>) -->
    <path d="M 64 216 L 104 256 L 64 296" fill="none" stroke="#10b981" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Relay Paths (oly) -->
    <use href="#relay-paths" stroke="url(#relay-grad)" stroke-width="20" />

    <!-- Animated Data Flow (Dashed Lines passing through 'oly') -->
    <g fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 26" opacity="0.9">
        <circle cx="184" cy="256" r="40">
            <animate attributeName="stroke-dashoffset" from="36" to="0" dur="1s" repeatCount="indefinite" />
        </circle>
        <path d="M 264 176 L 264 296">
            <animate attributeName="stroke-dashoffset" from="36" to="0" dur="1s" repeatCount="indefinite" />
        </path>
        <path d="M 304 216 L 354 286">
            <animate attributeName="stroke-dashoffset" from="36" to="0" dur="1s" repeatCount="indefinite" />
        </path>
        <path d="M 384 216 L 324 356">
            <animate attributeName="stroke-dashoffset" from="36" to="0" dur="1s" repeatCount="indefinite" />
        </path>
    </g>

    <!-- Relay Connection Nodes (Circuit joints) -->
    <g fill="#ffffff" stroke="#020617" stroke-width="5">
        <!-- Nodes on 'o' -->
        <circle cx="184" cy="216" r="8" />
        <circle cx="184" cy="296" r="8" />
        <!-- Nodes on 'l' -->
        <circle cx="264" cy="176" r="8" />
        <circle cx="264" cy="296" r="8" />
        <!-- Nodes on 'y' -->
        <circle cx="304" cy="216" r="8" />
        <circle cx="384" cy="216" r="8" />
        <circle cx="354" cy="286" r="8" />
        <circle cx="324" cy="356" r="8" />
    </g>

    <!-- CLI Blinking Cursor -->
    <rect x="424" y="216" width="24" height="80" rx="4" fill="#10b981">
        <animate attributeName="opacity" values="1;0;1" keyTimes="0;0.5;1" dur="1s" calcMode="discrete" repeatCount="indefinite" />
    </rect>

    <!-- Premium Inner Glass / Border Highlight -->
    <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1" />
</svg>