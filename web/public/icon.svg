<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Deep OLED Black Background -->
  <rect width="64" height="64" rx="14" fill="#050505" />
  
  <!-- Crisp CLI Prompt (>_) in Emerald Green -->
  <path d="M 8 12 L 12 16 L 8 20 M 15 20 L 19 20" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" />

  <!-- The "oly" Text (Pure White, Ultra-Geometric) -->
  <g fill="none" stroke="#ffffff" stroke-width="4">
    <!-- 'o' - Mathematically perfect ring -->
    <circle cx="18" cy="36" r="6" />
    
    <!-- 'l' - Straight vertical road dash (6px dash, 4px gap exactly fits the height) -->
    <line x1="33" y1="18" x2="33" y2="44" stroke-dasharray="6 4" stroke-linecap="butt" />
    
    <!-- 'y' - Restored classic diagonal structure, kept surgically sharp -->
    <!-- The right branch forms a continuous diagonal stem downwards, left branch intersects -->
    <path d="M 42 30 L 47 39 M 52 30 L 42 48" stroke-linecap="butt" />
  </g>
</svg>